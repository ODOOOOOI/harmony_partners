<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하모니렌트카 영업 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f9ff;color:#191f2e;min-height:100vh}

/* HEADER */
header{background:#fff;border-bottom:1px solid #e8edf5;padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#1565c0,#42a5f5);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff}
.logo-info h1{font-size:16px;font-weight:700;color:#1565c0}
.logo-info p{font-size:11px;color:#8a94a6}

/* 메인 */
.page{max-width:760px;margin:0 auto;padding:40px 20px 80px}

/* 인트로 */
.intro{text-align:center;margin-bottom:44px}
.intro-wave{font-size:40px;margin-bottom:14px}
.intro h2{font-size:26px;font-weight:900;color:#191f2e;margin-bottom:10px;line-height:1.35}
.intro p{font-size:16px;color:#6b7a99;line-height:1.7}

/* 검색 */
.search-box{position:relative;margin-bottom:48px}
.search-box input{width:100%;padding:18px 56px 18px 22px;border:2px solid #e0e8f5;border-radius:18px;font-size:16px;font-family:'Noto Sans KR',sans-serif;background:#fff;color:#191f2e;outline:none;transition:border .2s,box-shadow .2s;box-shadow:0 2px 12px rgba(21,101,192,.06)}
.search-box input:focus{border-color:#1565c0;box-shadow:0 0 0 4px rgba(21,101,192,.1)}
.search-box input::placeholder{color:#b0baca}
.search-box .search-ico{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:22px;pointer-events:none}

/* 카테고리 그리드 */
.section-label{font-size:13px;font-weight:700;color:#8a94a6;letter-spacing:.5px;margin-bottom:14px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:48px}
.cat-card{background:#fff;border:2px solid #e8edf5;border-radius:20px;padding:26px 16px;cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.cat-card:hover{border-color:#1565c0;box-shadow:0 8px 24px rgba(21,101,192,.13);transform:translateY(-3px)}
.cat-card:active{transform:scale(.97)}
.cat-card .ico{font-size:34px;margin-bottom:12px}
.cat-card .name{font-size:15px;font-weight:700;color:#191f2e;margin-bottom:4px}
.cat-card .cnt{font-size:12px;color:#8a94a6}

/* 결과 리스트 (검색 시) */
.result-area{display:none}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.result-header h3{font-size:17px;font-weight:700}
.result-back{background:#f0f4fc;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;color:#1565c0;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.result-back:hover{background:#dce8fa}
.result-card{background:#fff;border:2px solid #e8edf5;border-radius:16px;padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .18s}
.result-card:hover{border-color:#1565c0;box-shadow:0 4px 16px rgba(21,101,192,.1)}
.result-card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.result-card-title{font-size:15px;font-weight:700;color:#191f2e}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:600;white-space:nowrap}
.b-script{background:#e6f4ee;color:#0a7a4e;border-color:#b2dfcc}
.b-product{background:#fff3e0;color:#a05000;border-color:#ffd09e}
.b-rule{background:#fdecea;color:#b02020;border-color:#f5bcb8}
.b-faq{background:#ede9fb;color:#5020a0;border-color:#c9bdf5}
.b-process{background:#e0f5f9;color:#006080;border-color:#a0dced}
.result-card-desc{font-size:13px;color:#6b7a99;line-height:1.6}
.empty-result{text-align:center;padding:48px 0;color:#8a94a6}
.empty-result .ico{font-size:36px;margin-bottom:12px}
.empty-result p{font-size:15px}

/* POPUP */
.overlay{display:none;position:fixed;inset:0;background:rgba(25,31,46,.35);z-index:400;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.popup{background:#fff;border-radius:24px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(21,101,192,.18);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.popup-top{display:flex;align-items:flex-start;justify-content:space-between;padding:26px 26px 18px;position:sticky;top:0;background:#fff;border-radius:24px 24px 0 0;border-bottom:1px solid #f0f4fc;z-index:1}
.popup-top-left .badge{margin-bottom:8px;display:inline-block}
.popup-top-left h2{font-size:20px;font-weight:900;color:#191f2e;line-height:1.35}
.popup-close{background:#f0f4fc;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;color:#6b7a99;flex-shrink:0;margin-left:10px;transition:all .15s;margin-top:2px}
.popup-close:hover{background:#dce8fa;color:#1565c0}
.popup-body{padding:20px 26px 28px}
.popup-desc{font-size:14px;color:#6b7a99;line-height:1.75;margin-bottom:20px;background:#f7f9ff;border-radius:12px;padding:14px 16px}

.block{margin-bottom:22px}
.block-label{font-size:12px;font-weight:700;color:#1565c0;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.script-bubble{background:#f0f4fc;border-radius:14px;padding:14px 16px;margin-bottom:8px}
.script-bubble.cust{background:#f7f9ff;border:1.5px solid #e8edf5}
.bubble-who{font-size:11px;font-weight:700;color:#1565c0;margin-bottom:6px}
.bubble-who.cust{color:#8a94a6}
.bubble-text{font-size:14px;color:#191f2e;line-height:1.75}
.bubble-tip{font-size:12px;color:#1565c0;margin-top:8px;padding-top:8px;border-top:1px solid #dce8fa;font-style:italic}

.info-table{width:100%;border-collapse:collapse;font-size:13px;border-radius:12px;overflow:hidden}
.info-table th{text-align:left;padding:10px 12px;background:#f0f4fc;color:#1565c0;font-weight:700;font-size:12px;border-bottom:2px solid #dce8fa}
.info-table td{padding:10px 12px;border-bottom:1px solid #f0f4fc;color:#191f2e;vertical-align:top}
.info-table tr:last-child td{border-bottom:none}
.info-table tr:hover td{background:#f7f9ff}

.rule-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f4fc;font-size:14px;color:#4a5570}
.rule-row:last-child{border-bottom:none}
.rule-ico{font-size:16px;flex-shrink:0;margin-top:1px}
</style>
</head>
<body>

<header>
  <div class="logo">HR</div>
  <div class="logo-info">
    <h1>하모니렌트카 영업 도우미</h1>
    <p>언제든지 꺼내 쓰는 영업 지식 모음</p>
  </div>
</header>

<div class="page">

  <!-- 인트로 -->
  <div class="intro">
    <div class="intro-wave">👋</div>
    <h2>궁금한 게 생겼나요?<br>바로 찾아드릴게요!</h2>
    <p>상품, 규정, 스크립트 — 필요한 걸 검색하거나<br>아래 카테고리를 눌러보세요. 아주 간단해요 😊</p>
  </div>

  <!-- 검색 -->
  <div class="search-box">
    <input id="search-input" type="text" placeholder="예) 동반차, 위약금, 사고났을때, 해피콜..." oninput="onSearch(this.value)">
    <span class="search-ico">🔍</span>
  </div>

  <!-- 메인 뷰 -->
  <div id="main-view">
    <div class="section-label">카테고리를 선택하세요</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- 결과 뷰 -->
  <div class="result-area" id="result-area">
    <div class="result-header">
      <h3 id="result-title">검색 결과</h3>
      <button class="result-back" onclick="goHome()">← 처음으로</button>
    </div>
    <div id="result-list"></div>
  </div>

</div>

<!-- 팝업 -->
<div class="overlay" id="overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <div class="popup-top">
      <div class="popup-top-left">
        <div class="badge" id="popup-badge"></div>
        <h2 id="popup-title"></h2>
      </div>
      <button class="popup-close" onclick="closePopupBtn()">✕</button>
    </div>
    <div class="popup-body" id="popup-body"></div>
  </div>
</div>

<script>
const CATS=[
  {key:'script',ico:'💬',name:'응대 스크립트',desc:'고객에게 뭐라고 말할까?'},
  {key:'product',ico:'🚗',name:'상품 안내',desc:'렌트 상품 종류 & 비교'},
  {key:'rule',ico:'📋',name:'필수 규정',desc:'계약·보험·연체 규정'},
  {key:'faq',ico:'❓',name:'자주 묻는 질문',desc:'고객이 자주 물어보는 것'},
  {key:'process',ico:'⚙️',name:'계약 프로세스',desc:'계약 단계별 흐름'},
];

const BC={script:'b-script',product:'b-product',rule:'b-rule',faq:'b-faq',process:'b-process'};
const BN={script:'응대 스크립트',product:'상품 안내',rule:'필수 규정',faq:'자주 묻는 질문',process:'계약 프로세스'};

const DATA=[
  {id:1,type:'script',title:'처음 전화할 때 뭐라고 하나요?',tags:['인사','첫통화','콜드콜','신규'],desc:'처음 연락하는 고객에게 하모니렌트카를 자연스럽게 소개하는 방법이에요.',detail:{scenarios:[{label:'콜드콜 — 처음 전화할 때',scripts:[{role:'rep',text:'"안녕하세요, 하모니렌트카의 [이름]입니다. 갑자기 연락드려서 실례가 됐다면 죄송합니다. 혹시 지금 잠깐 말씀 나눌 수 있을까요?"',tip:'짧게 시작해요. 시간부터 여쭤보는 게 핵심이에요.'},{role:'cust',text:'"네, 잠깐은 괜찮아요."'},{role:'rep',text:'"저희 하모니렌트카는 신용 문제로 차량 마련이 어려우신 분들도 자체 심사 기준으로 승인을 진행하고 있어요. 혹시 현재 차량 이용하고 계신가요?"',tip:'우리 상품의 차별점(신용 심사 유연)을 자연스럽게 녹여요.'}]},{label:'바쁘다고 하실 때',scripts:[{role:'cust',text:'"지금 바빠서요."'},{role:'rep',text:'"아, 바쁘신 거 충분히 이해합니다. 그럼 언제쯤 다시 연락드리면 될까요? 5분이면 충분합니다."',tip:'거절당해도 다음 약속을 잡는 것으로 마무리해요.'}]}]}},
  {id:2,type:'script',title:'렌트 vs 리스 vs 할부, 어떻게 설명하나요?',tags:['렌트','리스','할부','비교'],desc:'고객이 세 가지 방식의 차이를 헷갈려할 때 쉽게 설명하는 방법이에요.',detail:{scenarios:[{label:'"렌트랑 리스가 뭐가 달라요?"',scripts:[{role:'cust',text:'"렌트랑 리스가 뭐가 다른 거예요?"'},{role:'rep',text:'"렌트는 영업용 번호판(하·허·호)을 달고, 보험이 렌트료에 포함돼 있어요. 사고 나셔도 보험료가 절대 오르지 않아요. 리스는 자가용 번호판이고 보험을 따로 가입하셔야 해요."',tip:'보험료 할증 없음이 가장 강력한 포인트예요!'},{role:'cust',text:'"할부는요?"'},{role:'rep',text:'"할부는 차가 내 명의가 되지만 대출로 잡혀서 신용도에 영향이 가요. 렌트는 빌려타는 방식이라 대출로 안 잡혀서, 나중에 집 살 때 대출 한도를 아낄 수 있어요."',tip:'신용점수 보호 포인트를 꼭 언급하세요.'}]}]}},
  {id:3,type:'script',title:'왜 렌트가 유리한지 설명해주세요',tags:['장기렌트','장점','절세','보험'],desc:'장기렌트의 핵심 장점을 고객이 이해하기 쉽게 설명하는 방법이에요.',detail:{scenarios:[{label:'"왜 렌트가 유리한가요?"',scripts:[{role:'rep',text:'"첫째, 초기 비용이 없어요. 취득세·자동차세·보험료가 모두 월 렌트료에 포함돼 있어서 목돈 없이 시작할 수 있어요."',tip:''},{role:'rep',text:'"둘째, 사고 나셔도 렌트료가 절대 오르지 않아요. 보험료 할증 걱정이 없어요."',tip:'초보 운전자에게 특히 강력한 포인트예요!'},{role:'rep',text:'"셋째, 대출로 안 잡혀서 신용점수에 영향이 없어요. 사업자·법인이시라면 월 렌트료 전체가 비용 처리돼서 절세 효과도 있어요."',tip:'사업자 고객에게는 절세 효과를 꼭 언급하세요!'}]}]}},
  {id:4,type:'script',title:'고객이 화가 났을 때 어떻게 하나요?',tags:['클레임','불만','민원','사고'],desc:'불만 고객을 진정시키고 해결책을 제시하는 단계별 방법이에요.',detail:{scenarios:[{label:'고객이 강하게 불만을 표현할 때',scripts:[{role:'cust',text:'"이게 말이 됩니까! 차에 문제가 있잖아요!"'},{role:'rep',text:'"많이 불편하셨겠습니다. 먼저 진심으로 사과드립니다. 정확히 어떤 문제가 발생했는지 말씀해 주시면 바로 해결 방법을 찾아드릴게요."',tip:'먼저 공감, 그 다음 해결이에요. 절대 변명하지 마세요.'},{role:'rep',text:'"하모니 지정 공업사로 바로 연결해 드릴게요. 사고 접수는 1661-7977로 해주시면 됩니다."',tip:'해결책을 구체적으로 제시하고 빠른 조치를 약속하세요.'}]}]}},
  {id:5,type:'script',title:'고객이 거절하거나 망설일 때',tags:['거절','고민중','경쟁사'],desc:'고객이 구매를 거절하거나 망설일 때 대응하는 방법이에요.',detail:{scenarios:[{label:'"지금 당장은 필요 없어요"',scripts:[{role:'cust',text:'"지금 당장은 필요 없어요."'},{role:'rep',text:'"네, 충분히 이해합니다. 혹시 언제쯤 필요하실 것 같으세요? 그때 맞춰서 다시 연락드려도 될까요?"',tip:'거절을 미래 기회로 바꾸세요.'}]},{label:'"다른 곳이랑 비교해볼게요"',scripts:[{role:'cust',text:'"다른 렌트사랑 비교해볼게요."'},{role:'rep',text:'"물론이죠! 비교해보시는 거 당연한 거예요. 다만 저희만의 가장 큰 차이는 신용 심사 기준이 훨씬 유연하다는 점이에요. 타사에서 거절당한 분들도 저희에서 승인되는 경우가 많아요."',tip:'하모니만의 차별점을 강조하세요.'}]}]}},
  {id:6,type:'script',title:'해피콜 전에 고객에게 미리 설명하기',tags:['해피콜','계약','사전설명'],desc:'해피콜 전에 고객이 당황하지 않도록 미리 안내하는 방법이에요.',detail:{scenarios:[{label:'해피콜 사전 안내',scripts:[{role:'rep',text:'"계약이 완료되면 본사(02-1588-5802)에서 해피콜 전화가 와요. 반드시 받아주셔야 차량 출고가 진행됩니다!"',tip:'해피콜을 못 받으면 출고가 지연돼요. 꼭 강조하세요.'},{role:'rep',text:'"해피콜에서 운전자 범위, 약정 주행거리, 중도해지 위약금 같은 핵심 내용을 확인할 거예요. 제가 미리 설명드린 내용들이라 편하게 답해주시면 돼요."',tip:'미리 설명해두면 해피콜에서 고객이 당황하지 않아요.'}]}]}},

// 카테고리 카드 렌더
function buildCats(){
  const grid=document.getElementById('cat-grid');
  CATS.forEach(c=>{
    const cnt=DATA.filter(d=>d.type===c.key).length;
    const el=document.createElement('div');
    el.className='cat-card';
    el.innerHTML=`<div class="ico">${c.ico}</div><div class="name">${c.name}</div><div class="cnt">${cnt}개 항목</div>`;
    el.onclick=()=>showCat(c.key,c.name);
    grid.appendChild(el);
  });
}

function showCat(type,name){
  const list=DATA.filter(d=>d.type===type);
  showResults(list,name+'에서 찾기');
}

function onSearch(q){
  if(!q.trim()){goHome();return}
  const kw=q.trim().toLowerCase();
  const list=DATA.filter(d=>
    d.title.toLowerCase().includes(kw)||
    d.desc.toLowerCase().includes(kw)||
    d.tags.some(t=>t.toLowerCase().includes(kw))
  );
  showResults(list,`"${q}" 검색 결과`);
}

function showResults(list,title){
  document.getElementById('main-view').style.display='none';
  const area=document.getElementById('result-area');
  area.style.display='block';
  document.getElementById('result-title').textContent=title;
  const rl=document.getElementById('result-list');
  if(!list.length){
    rl.innerHTML='<div class="empty-result"><div class="ico">🔍</div><p>검색 결과가 없어요.<br>다른 키워드로 찾아보세요!</p></div>';
    return;
  }
  rl.innerHTML=list.map(d=>`
    <div class="result-card" onclick="openPopup(${d.id})">
      <div class="result-card-top">
        <div class="result-card-title">${d.title}</div>
        <span class="badge ${BC[d.type]}">${BN[d.type]}</span>
      </div>
      <div class="result-card-desc">${d.desc}</div>
    </div>
  `).join('');
}

function goHome(){
  document.getElementById('search-input').value='';
  document.getElementById('main-view').style.display='block';
  document.getElementById('result-area').style.display='none';
}

function openPopup(id){
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  document.getElementById('popup-badge').className='badge '+BC[d.type];
  document.getElementById('popup-badge').textContent=BN[d.type];
  document.getElementById('popup-title').textContent=d.title;
  let html=`<div class="popup-desc">${d.desc}</div>`;
  if(d.detail.scenarios){
    d.detail.scenarios.forEach(s=>{
      html+=`<div class="block"><div class="block-label">${s.label}</div>`;
      s.scripts.forEach(sc=>{
        html+=`<div class="script-bubble ${sc.role==='cust'?'cust':''}">
          <div class="bubble-who ${sc.role==='cust'?'cust':''}">${sc.role==='rep'?'▶ 영업담당자':'고객'}</div>
          <div class="bubble-text">${sc.text}</div>
          ${sc.tip?`<div class="bubble-tip">💡 ${sc.tip}</div>`:''}
        </div>`;
      });
      html+='</div>';
    });
  }
  if(d.detail.table){
    html+=`<div class="block"><div class="block-label">한눈에 보기</div>
      <table class="info-table"><tr>${d.detail.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr>
      ${d.detail.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
      </table></div>`;
  }
  if(d.detail.rules){
    html+=`<div class="block"><div class="block-label">꼭 알아두세요</div>`;
    d.detail.rules.forEach(r=>{html+=`<div class="rule-row"><span class="rule-ico">${r.ico}</span><span>${r.text}</span></div>`});
    html+='</div>';
  }
  document.getElementById('popup-body').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePopup(e){if(e.target===document.getElementById('overlay'))closePopupBtn()}
function closePopupBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopupBtn()});

buildCats();
</script>
